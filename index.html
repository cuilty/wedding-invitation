<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paola & Emilio - Wedding Invitation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="invitation-card">
            <!-- Watercolor Palm Trees -->
            <div class="palm-header">
                <img src="photos/palm-header.png" alt="" aria-hidden="true">
            </div>

            <p class="prelude">We're doing it!</p>

            <h1 class="names">
                <span class="names-first">Paola</span>
                <span class="names-ampersand">&</span>
                <span class="names-second">Emilio</span>
            </h1>

            <p class="invite-text">are tying the knot and you're invited</p>

            <div class="date-display">
                <div class="date-day">24</div>
                <div class="date-month-year">October 2026</div>
            </div>

            <p class="invite-text">four o'clock in the evening</p>

            <div class="location">
                <p>Loulu Palm</p>
            </div>
            <div class="location">
                <p>North Shore, Oahu, Hawaii</p>
            </div>

            <div class="divider" style="margin-top: 2rem;">
                <span></span>
                <span></span>
            </div>

            <p class="language-prompt">Pick your language</p>
            <p class="language-prompt-es">Elige tu idioma</p>

            <div class="language-buttons">
                <a href="invitation-en.html" class="btn btn-primary">
                    <span class="btn-text">English</span>
                </a>
                <a href="invitation-es.html" class="btn btn-secondary">
                    <span class="btn-text">Español</span>
                </a>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>We can't wait to celebrate with you in paradise</p>
    </footer>
</body>
</html>
